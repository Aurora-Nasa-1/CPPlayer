    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
    androidTestImplementation platform(libs.androidx.compose.bom)
    androidTestImplementation libs.androidx.compose.ui.test.junit4
    debugImplementation libs.androidx.compose.ui.tooling
    debugImplementation libs.androidx.compose.ui.test.manifest

    // For Sentry ASM instrumentation to resolve window classes on some devices
    compileOnly libs.androidx.window
}

tasks.register('buildRust', Exec) {
    def cargoHome = System.getenv('CARGO_HOME') ?: "${System.getProperty('user.home')}/.cargo/bin"
    environment 'PATH', "${cargoHome}:${System.getenv('PATH')}"
    // ANDROID_NDK_HOME 由 CI 设置，本地开发时 cargo-ndk 自动检测
    def ndkHome = System.getenv('ANDROID_NDK_HOME')
    if (ndkHome) {
        environment 'ANDROID_NDK_HOME', ndkHome
    }
    workingDir file('src/main/rust')
    commandLine 'cargo', 'ndk',
            '-t', 'arm64-v8a',
            '-o', '../jniLibs',
            'build', '--release'
}

// 确保 buildRust 在 JNI 合并和 Kotlin 编译之前完成（覆盖所有变体：debug/release/fastRelease）
tasks.whenTaskAdded { task ->
    if (task.name.startsWith('javaPreCompile') || task.name.startsWith('merge') && task.name.endsWith('JniLibFolders')) {
        task.dependsOn 'buildRust'
    }
}


sentry {
    org = "aurora-9i"
    projectName = "android"

    // 确保 SENTRY_AUTH_TOKEN 既不为 null 也不为空字符串
    def hasAuthToken = (System.getenv("SENTRY_AUTH_TOKEN") ?: "").trim() != ""

    // this will upload your source code to Sentry to show it as part of the stack traces
    // disable if you don't want to expose your sources
    includeSourceContext = hasAuthToken
    includeNativeSources = hasAuthToken

    // CI 环境下如果没有 SENTRY_AUTH_TOKEN 则跳过上传，避免构建失败
    autoUpload = hasAuthToken

    // 禁用所有可能在没有 token 时导致失败的任务
    uploadNativeSymbols = hasAuthToken
    autoUploadNativeSymbols = hasAuthToken
    autoUploadSourceContext = hasAuthToken
    autoUploadProguardMapping = hasAuthToken
    includeProguardMapping = hasAuthToken
}
