import org.jetbrains.kotlin.gradle.dsl.JvmTarget

plugins {
    alias libs.plugins.android.application
    alias libs.plugins.jetbrains.kotlin.plugin.compose

    id 'io.sentry.android.gradle' version '6.12.0'
}

// 动态版本号：基于 git tag 和 commit count（兼容 configuration cache）
def gitShaProvider = providers.exec {
    commandLine 'git', 'rev-parse', '--short', 'HEAD'
    workingDir = rootDir
}.standardOutput.asText.map { it.trim() }

def gitVersionCodeProvider = providers.exec {
    commandLine 'git', 'rev-list', '--count', 'HEAD'
    workingDir = rootDir
}.standardOutput.asText.map { it.trim().toInteger() }

def gitDescribeProvider = providers.exec {
    commandLine 'git', 'describe', '--tags', '--always'
    workingDir = rootDir
}.standardOutput.asText.map { it.trim() }

// 在 defaultConfig 中使用这些 provider 值
def resolvedSha = gitShaProvider.getOrElse('unknown')
def resolvedVersionCode = gitVersionCodeProvider.getOrElse(1)
def resolvedDescribe = gitDescribeProvider.getOrElse('')
def resolvedVersionName = resolvedDescribe.matches('^v?\\d+.*') ? resolvedDescribe.replaceFirst(/^v/, '') : "1.0.${resolvedVersionCode}"

android {
    namespace 'cp.player'
    compileSdk 37

    signingConfigs {
        def commonSigningConfig = {
            storeFile file('../debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        debug(commonSigningConfig)
        release {
            // CI 环境：从 Gradle properties 读取签名配置（-P 参数传入）
            def storeFilePath = findProperty('RELEASE_STORE_FILE')
            if (storeFilePath) {
                storeFile file(storeFilePath)
                storePassword findProperty('RELEASE_STORE_PASSWORD')
                keyAlias findProperty('RELEASE_KEY_ALIAS')
                keyPassword findProperty('RELEASE_KEY_PASSWORD')
            } else {
                // 本地开发：使用 debug keystore
                storeFile file('../debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    defaultConfig {
        applicationId "cp.player"
        minSdk 28
        targetSdk 36
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        buildConfigField "String", "GIT_SHA", "\"${resolvedSha}\""

        ndk {
            abiFilters 'arm64-v8a'
        }

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
        resConfigs "en", "zh", "ja"
    }

    sourceSets {
        main {
            jniLibs.srcDirs += 'src/main/jniLibs'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            crunchPngs false
        }
        // 快速编译且具备接近 release 的运行性能（关闭 R8 压缩，关闭 debuggable，适用于 Compose 性能调试）
        fastRelease {
            initWith release
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlin {
        compilerOptions {
            jvmTarget = JvmTarget.JVM_21
            freeCompilerArgs.add("-opt-in=androidx.compose.material3.ExperimentalMaterial3ExpressiveApi")
        }
    }

    buildFeatures {
        compose true
        buildConfig true
    }
    packagingOptions {
        jniLibs.useLegacyPackaging = false
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/DEPENDENCIES'
            excludes += 'META-INF/LICENSE*'
            excludes += 'META-INF/NOTICE*'
            excludes += 'META-INF/*.kotlin_module'
        }
    }
}

dependencies {
